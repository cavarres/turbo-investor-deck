<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>Turbo — Q1 2026: Executive Summary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #0d0d1a;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .slide {
      width: 1280px;
      height: 720px;
      background: #0d0d1a;
      position: relative;
      padding: 52px 72px;
      display: flex;
      flex-direction: column;
    }
    .slide-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
    .wordmark {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #7c5af6;
    }
    .headline {
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.025em;
      line-height: 1;
      margin-bottom: 40px;
    }
    .headline span {
      color: #7c5af6;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      flex: 1;
    }
    .kpi-card {
      background: #1e1e3a;
      border: 1px solid rgba(124,90,246,0.2);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .kpi-card:first-child {
      border-left: 3px solid #7c5af6;
    }
    .kpi-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 16px;
    }
    .kpi-value {
      font-size: 52px;
      font-weight: 700;
      line-height: 0.9;
      color: #f59e0b;
      letter-spacing: -0.02em;
    }
    .kpi-delta {
      margin-top: 12px;
      font-size: 12px;
      font-weight: 600;
      color: #22c55e;
      letter-spacing: 0.04em;
    }
    .kpi-delta.flat {
      color: rgba(255,255,255,0.4);
    }
    .kpi-sub {
      margin-top: 4px;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="slide-header">
      <div class="section-label">Executive Summary</div>
      <div class="wordmark">TURBO.</div>
    </div>

    <div class="headline">Q1 was our strongest quarter <span>yet.</span></div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">ARR</div>
        <div>
          <div class="kpi-value">$2.1M</div>
          <div class="kpi-delta">+38% QoQ</div>
          <div class="kpi-sub">vs $1.52M in Q4 2025</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Active Clients</div>
        <div>
          <div class="kpi-value">47</div>
          <div class="kpi-delta">+12 net new</div>
          <div class="kpi-sub">35 in Q4 2025</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Gross Margin</div>
        <div>
          <div class="kpi-value">71%</div>
          <div class="kpi-delta">+4 pts QoQ</div>
          <div class="kpi-sub">67% in Q4 2025</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Net Revenue Retention</div>
        <div>
          <div class="kpi-value">118%</div>
          <div class="kpi-delta flat">Stable</div>
          <div class="kpi-sub">117% in Q4 2025</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

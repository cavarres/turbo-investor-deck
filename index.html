<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turbo — Q1 2026 Investor Update</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      overflow: hidden;
    }
    #slideFrame {
      position: fixed;
      width: 1280px; height: 720px;
      border: none;
      transform-origin: top left;
    }
    .nav-btn {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.08); border: none; color: white;
      font-size: 20px; width: 44px; height: 44px; border-radius: 50%;
      cursor: pointer; z-index: 100; transition: background 0.2s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.2); }
    .nav-prev { left: 12px; }
    .nav-next { right: 12px; }
    .slide-counter {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      font-family: sans-serif;
      font-size: 11px; font-weight: 500; letter-spacing: 0.14em;
      color: rgba(255,255,255,0.35); z-index: 100;
    }
  </style>
</head>
<body>
  <iframe id="slideFrame" src="slide-01.html"></iframe>
  <button class="nav-btn nav-prev" onclick="prevSlide()">&#8592;</button>
  <button class="nav-btn nav-next" onclick="nextSlide()">&#8594;</button>
  <div class="slide-counter" id="counter">1 / 11</div>
  <script>
    const total = 11;
    let current = 1;

    function scale() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const s = Math.min(w / 1280, h / 720);
      const f = document.getElementById('slideFrame');
      f.style.transform = 'scale(' + s + ')';
      f.style.left = Math.round((w - 1280 * s) / 2) + 'px';
      f.style.top  = Math.round((h - 720  * s) / 2) + 'px';
    }

    function show(n) {
      const pad = String(n).padStart(2, '0');
      document.getElementById('slideFrame').src = 'slide-' + pad + '.html';
      document.getElementById('counter').textContent = n + ' / ' + total;
      current = n;
    }

    function nextSlide() { if (current < total) show(current + 1); }
    function prevSlide() { if (current > 1) show(current - 1); }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSlide();
    });

    // Touch swipe support
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) { dx < 0 ? nextSlide() : prevSlide(); }
    }, { passive: true });

    window.addEventListener('resize', scale);
    scale();
  </script>
</body>
</html>

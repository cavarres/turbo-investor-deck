<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>Turbo — Closing</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    body { position: relative; overflow: hidden; }
    .accent-strip { position: absolute; top: 0; left: 0; width: 8px; height: 100%; background: var(--primary); }
    .content { position: relative; padding: 52px 88px 52px 96px; height: 720px; display: flex; flex-direction: column; justify-content: space-between; }
    .top-wm { font-family: var(--font-display); font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: var(--primary); margin-bottom: 48px; }
    .quote { font-family: var(--font-display); font-size: 40px; font-weight: 700; line-height: 1.25; color: #111; letter-spacing: -0.03em; margin-bottom: 56px; max-width: 960px; }
    .contact { display: flex; flex-direction: column; gap: 10px; }
    .email { font-size: 16px; font-weight: 600; color: #111; }
    .linkedin { font-size: 14px; color: #999; }
    .conf { font-size: 12px; color: #999; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="accent-strip"></div>
  <div class="content">
    <div>
      <div class="top-wm">TURBO.</div>
      <div class="quote">&ldquo;This is not a product development tool. It is far bigger than a product development system. This is an operating system. This is the future of the computer.&rdquo;</div>
    </div>
    <div class="contact">
      <div class="email">jeremy@turbotime.io</div>
      <div class="linkedin">linkedin.com/company/turbotime-ai</div>
      <div class="conf">Confidential &nbsp;&mdash;&nbsp; March 2026</div>
    </div>
  </div>
</body>
</html>

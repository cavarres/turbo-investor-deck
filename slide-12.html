<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>Turbo — Closing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px; height: 720px; overflow: hidden;
      background: #5200FF; font-family: 'Inter', system-ui, sans-serif; color: #fff;
    }
    .slide {
      width: 1280px; height: 720px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 72px 120px;
      position: relative;
    }
    .top-bar {
      position: absolute; top: 52px; left: 72px; right: 72px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .top-line { width: 120px; height: 2px; background: #AAFE05; }
    .wordmark { font-size: 16px; font-weight: 700; letter-spacing: 0.08em; color: #AAFE05; }
    .quote {
      font-size: 28px; font-weight: 600; color: #fff;
      line-height: 1.45; letter-spacing: -0.02em;
      text-align: center; max-width: 860px;
    }
    .bottom-bar {
      position: absolute; bottom: 44px; left: 72px; right: 72px;
      display: flex; align-items: center; justify-content: center; gap: 48px;
    }
    .contact-link { font-size: 13px; color: #AAFE05; text-decoration: none; }
    .contact-muted { font-size: 13px; color: rgba(255,255,255,0.35); }
    .slide-num { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.2); letter-spacing: 0.12em; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="top-bar">
      <div class="top-line"></div>
      <div class="wordmark">TURBO.</div>
    </div>

    <div class="quote">
      "This is not a product development tool. It is far bigger than a product development system. This is an operating system. This is the future of the computer."
    </div>

    <div class="bottom-bar">
      <a class="contact-link" href="mailto:jeremy@turbotime.io">jeremy@turbotime.io</a>
      <span class="contact-muted">linkedin.com/company/turbotime-ai</span>
      <span class="contact-muted">Confidential — March 2026</span>
      <span class="slide-num">12 / 12</span>
    </div>
  </div>
</body>
</html>

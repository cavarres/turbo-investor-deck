<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>Turbo — Q1 2026: Revenue Growth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #fafafa;
      font-family: 'Instrument Sans', sans-serif;
    }
    .slide {
      width: 1280px;
      height: 720px;
      position: relative;
      display: grid;
      grid-template-columns: 420px 1fr;
    }
    .left {
      padding: 64px 56px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid #ece9ff;
      background: #fafafa;
    }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(17,17,17,0.35);
    }
    .big-stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .stat-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(17,17,17,0.4);
      margin-bottom: 16px;
    }
    .stat-value {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 96px;
      line-height: 0.85;
      color: #5200FF;
      letter-spacing: -0.02em;
    }
    .stat-desc {
      margin-top: 20px;
      font-size: 15px;
      color: rgba(17,17,17,0.55);
      line-height: 1.5;
      max-width: 260px;
    }
    .slide-num {
      font-size: 11px;
      font-weight: 500;
      color: rgba(17,17,17,0.2);
      letter-spacing: 0.12em;
    }
    .right {
      padding: 64px 60px;
      display: flex;
      flex-direction: column;
    }
    .chart-title {
      font-size: 13px;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.01em;
      margin-bottom: 40px;
    }
    .chart-area {
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: 18px;
    }
    .bar-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      height: 100%;
      justify-content: flex-end;
    }
    .bar-wrap {
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 340px;
    }
    .bar {
      width: 48px;
      border-radius: 4px 4px 0 0;
      position: relative;
    }
    .bar.past {
      background: #ece9ff;
    }
    .bar.current {
      background: #5200FF;
    }
    .bar-val {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 600;
      color: #111;
      white-space: nowrap;
    }
    .bar-qtr {
      font-size: 11px;
      font-weight: 500;
      color: rgba(17,17,17,0.4);
      letter-spacing: 0.08em;
    }
    .bar.current + .bar-val,
    .bar-group:last-child .bar-val {
      color: #5200FF;
    }
    .target-line {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #ece9ff;
      font-size: 12px;
      color: rgba(17,17,17,0.4);
    }
    .target-line strong {
      color: #111;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="left">
      <div class="section-label">Revenue Growth</div>
      <div class="big-stat">
        <div class="stat-label">ARR — Q1 2026</div>
        <div class="stat-value">$2.1M</div>
        <div class="stat-desc">Up 38% quarter-over-quarter. On track to hit $4M ARR by end of 2026.</div>
      </div>
      <div class="slide-num">03 / 12</div>
    </div>
    <div class="right">
      <div class="chart-title">Annual Recurring Revenue — Quarterly</div>
      <div class="chart-area">
        <div class="bar-group">
          <div class="bar-wrap">
            <div class="bar past" style="height:38%">
              <div class="bar-val">$760K</div>
            </div>
          </div>
          <div class="bar-qtr">Q1 '25</div>
        </div>
        <div class="bar-group">
          <div class="bar-wrap">
            <div class="bar past" style="height:55%">
              <div class="bar-val">$1.1M</div>
            </div>
          </div>
          <div class="bar-qtr">Q2 '25</div>
        </div>
        <div class="bar-group">
          <div class="bar-wrap">
            <div class="bar past" style="height:68%">
              <div class="bar-val">$1.36M</div>
            </div>
          </div>
          <div class="bar-qtr">Q3 '25</div>
        </div>
        <div class="bar-group">
          <div class="bar-wrap">
            <div class="bar past" style="height:76%">
              <div class="bar-val">$1.52M</div>
            </div>
          </div>
          <div class="bar-qtr">Q4 '25</div>
        </div>
        <div class="bar-group">
          <div class="bar-wrap">
            <div class="bar current" style="height:100%">
              <div class="bar-val" style="color:#5200FF">$2.1M</div>
            </div>
          </div>
          <div class="bar-qtr" style="color:#5200FF;font-weight:600">Q1 '26</div>
        </div>
      </div>
      <div class="target-line">2026 target: <strong>$4M ARR</strong> &nbsp;&mdash;&nbsp; currently at 52.5% of annual goal</div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>Turbo — Headline Metrics</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1280px; height: 720px; overflow: hidden; background: #0c0c1e; font-family: 'Inter', sans-serif; color: #fff; }
    .slide { width: 1280px; height: 720px; padding: 48px 80px; display: flex; flex-direction: column; }
    .hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .sec { font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.45); }
    .wm { font-size: 14px; font-weight: 700; letter-spacing: 0.08em; color: #7c5af6; }
    .title { font-size: 52px; font-weight: 700; letter-spacing: -0.025em; color: #fff; margin-bottom: 36px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 44px; }
    .card { background: #1a1a38; padding: 32px 28px; border: 1px solid rgba(124,90,246,0.15); }
    .val { font-size: 48px; font-weight: 700; color: #7c5af6; line-height: 1; margin-bottom: 14px; letter-spacing: -0.02em; }
    .lbl { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 8px; }
    .sub { font-size: 12px; color: rgba(255,255,255,0.4); }
    .bottom { display: flex; gap: 56px; align-items: baseline; }
    .bi { display: flex; gap: 12px; align-items: baseline; }
    .bl { font-size: 16px; color: rgba(255,255,255,0.6); }
    .bv { font-size: 32px; font-weight: 700; color: #7c5af6; letter-spacing: -0.02em; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="hdr"><div class="sec">Headline Metrics</div><div class="wm">TURBO.</div></div>
    <div class="title">The Numbers</div>
    <div class="grid">
      <div class="card"><div class="val">$1.9M</div><div class="lbl">Pipeline Run Rate</div><div class="sub">~40% in paid pipeline</div></div>
      <div class="card"><div class="val">$86K</div><div class="lbl">Active MRR</div><div class="sub">12 seats across 9 clients</div></div>
      <div class="card"><div class="val">12,001</div><div class="lbl">LinkedIn Followers</div><div class="sub">240% of 5K target</div></div>
      <div class="card"><div class="val">93.7%</div><div class="lbl">Commit Share</div><div class="sub">SBC case study</div></div>
    </div>
    <div class="bottom">
      <div class="bi"><div class="bl">Size of team:</div><div class="bv">14</div></div>
      <div class="bi"><div class="bl">Runway:</div><div class="bv">45 months</div></div>
    </div>
  </div>
</body>
</html>

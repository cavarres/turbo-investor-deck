<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>Turbo — Q1 2026: Revenue Growth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #0d0d1a;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .slide {
      width: 1280px;
      height: 720px;
      position: relative;
      display: grid;
      grid-template-columns: 400px 1fr;
    }
    .left {
      padding: 56px 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid rgba(124,90,246,0.2);
      background: #0d0d1a;
    }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
    .big-stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .stat-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 16px;
    }
    .stat-value {
      font-size: 96px;
      font-weight: 700;
      line-height: 0.85;
      color: #f59e0b;
      letter-spacing: -0.02em;
    }
    .stat-desc {
      margin-top: 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      max-width: 260px;
    }
    .slide-num {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.12em;
    }
    .right {
      padding: 56px 52px;
      display: flex;
      flex-direction: column;
    }
    .right-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }
    .chart-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      letter-spacing: -0.01em;
    }
    .wordmark {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #7c5af6;
    }
    .chart-area {
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: 18px;
    }
    .bar-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      height: 100%;
      justify-content: flex-end;
    }
    .bar-wrap {
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 320px;
    }
    .bar {
      width: 48px;
      border-radius: 4px 4px 0 0;
      position: relative;
    }
    .bar.past {
      background: rgba(124,90,246,0.3);
    }
    .bar.current {
      background: #7c5af6;
    }
    .bar-val {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
    }
    .bar-qtr {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
    }
    .bar.current + .bar-val,
    .bar-group:last-child .bar-val {
      color: #f59e0b;
    }
    .target-line {
      margin-top: 20px;
      padding-top: 14px;
      border-top: 1px solid rgba(124,90,246,0.2);
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
    .target-line strong {
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="left">
      <div class="section-label">Revenue Growth</div>
      <div class="big-stat">
        <div class="stat-label">ARR — Q1 2026</div>
        <div class="stat-value">$2.1M</div>
        <div class="stat-desc">Up 38% quarter-over-quarter. On track to hit $4M ARR by end of 2026.</div>
      </div>
      <div class="slide-num">03 / 12</div>
    </div>
    <div class="right">
      <div class="right-header">
        <div class="chart-title">Annual Recurring Revenue — Quarterly</div>
        <div class="wordmark">TURBO.</div>
      </div>
      <div class="chart-area">
        <div class="bar-group">
          <div class="bar-wrap">
            <div class="bar past" style="height:38%">
              <div class="bar-val">$760K</div>
            </div>
          </div>
          <div class="bar-qtr">Q1 '25</div>
        </div>
        <div class="bar-group">
          <div class="bar-wrap">
            <div class="bar past" style="height:55%">
              <div class="bar-val">$1.1M</div>
            </div>
          </div>
          <div class="bar-qtr">Q2 '25</div>
        </div>
        <div class="bar-group">
          <div class="bar-wrap">
            <div class="bar past" style="height:68%">
              <div class="bar-val">$1.36M</div>
            </div>
          </div>
          <div class="bar-qtr">Q3 '25</div>
        </div>
        <div class="bar-group">
          <div class="bar-wrap">
            <div class="bar past" style="height:76%">
              <div class="bar-val">$1.52M</div>
            </div>
          </div>
          <div class="bar-qtr">Q4 '25</div>
        </div>
        <div class="bar-group">
          <div class="bar-wrap">
            <div class="bar current" style="height:100%">
              <div class="bar-val" style="color:#f59e0b">$2.1M</div>
            </div>
          </div>
          <div class="bar-qtr" style="color:#7c5af6;font-weight:600">Q1 '26</div>
        </div>
      </div>
      <div class="target-line">2026 target: <strong>$4M ARR</strong> &nbsp;&mdash;&nbsp; currently at 52.5% of annual goal</div>
    </div>
  </div>
</body>
</html>

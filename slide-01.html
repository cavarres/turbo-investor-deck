<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>Turbo — Investor Update Q1 2026</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    .slide { display: grid; grid-template-columns: 1fr 1fr; }
    .left  { padding: 64px 72px; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid var(--border); }
    .right { padding: 64px 72px; display: flex; flex-direction: column; justify-content: flex-end; background: var(--surface); }
    .hero  { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
    .hero-label { font-size: 12px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); }
    .hero-title { font-family: var(--font-serif); font-weight: 700; font-size: 76px; line-height: 0.95; color: var(--text); letter-spacing: -0.025em; }
    .meta { border-top: 1px solid var(--border); padding-top: 22px; display: flex; flex-direction: column; gap: 6px; }
    .meta-row { display: flex; align-items: center; gap: 10px; }
    .quarter-wrap { margin-bottom: 52px; }
    .quarter-label { font-size: 11px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 10px; }
    .quarter { font-family: var(--font-serif); font-style: italic; font-size: 104px; line-height: 0.85; color: var(--primary); letter-spacing: -0.02em; }
    .author-block { border-top: 1px solid var(--border); padding-top: 24px; }
    .author-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .author-role { font-size: 13px; color: var(--text-muted); }
    .num { position: absolute; top: 64px; right: 72px; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="left">
      <div class="wordmark">TURBO.</div>
      <div class="hero">
        <div class="hero-label">Investor Update</div>
        <div class="hero-title">The<br>numbers<br>are in.</div>
      </div>
      <div class="meta">
        <div class="meta-row">
          <div class="dot-accent"></div>
          <div class="t-label" style="text-transform:none;letter-spacing:0.02em;font-size:12px;color:var(--text-muted)">March 2026 &nbsp;&mdash;&nbsp; Confidential</div>
        </div>
        <div style="padding-left:16px;font-size:11px;color:var(--text-faint2)">(cao 29March2026)</div>
      </div>
    </div>
    <div class="right">
      <div class="quarter-wrap">
        <div class="quarter-label">Reporting period</div>
        <div class="quarter">Q1<br>2026</div>
      </div>
      <div class="author-block">
        <div class="author-name">Jeremy Topp</div>
        <div class="author-role">CEO &amp; Co-Founder</div>
      </div>
    </div>
    <div class="slide-num num">01 / 12</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>Turbo — Investor Update Q1 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #0d0d1a;
      font-family: 'Inter', system-ui, sans-serif;
      color: #fff;
    }

    .slide {
      width: 1280px;
      height: 720px;
      background: #0d0d1a;
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* LEFT HALF — dark purple top */
    .left {
      background: #1a0a3a;
      padding: 64px 72px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 0;
    }

    .top-line {
      width: 140px;
      height: 3px;
      background: #7c5af6;
      margin-bottom: 20px;
    }

    .wordmark {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 0.08em;
      color: #7c5af6;
    }

    /* RIGHT HALF — dark navy, bottom-aligned content */
    .right {
      background: #0d0d1a;
      padding: 64px 72px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .hero-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 40px;
    }

    .label {
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 16px;
    }

    .title {
      font-weight: 700;
      font-size: 56px;
      line-height: 1;
      color: #fff;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
    }

    .quarter-display {
      font-weight: 700;
      font-size: 72px;
      line-height: 0.9;
      color: #7c5af6;
      letter-spacing: -0.02em;
      margin-bottom: 40px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }

    .meta-text {
      font-weight: 400;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
    }

    .author-block {
      border-top: 1px solid rgba(124,90,246,0.25);
      padding-top: 20px;
    }

    .author-name {
      font-weight: 600;
      font-size: 15px;
      color: #fff;
      margin-bottom: 4px;
    }

    .author-role {
      font-weight: 400;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
    }

    .slide-num {
      position: absolute;
      bottom: 32px;
      right: 72px;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>
  <div class="slide">
    <!-- LEFT — dark purple -->
    <div class="left">
      <div class="top-line"></div>
      <div class="wordmark">TURBO.</div>
    </div>

    <!-- RIGHT — dark navy -->
    <div class="right">
      <div class="hero-text">
        <div class="label">Investor Update</div>
        <h1 class="title">The<br>numbers<br>are in.</h1>
        <div class="quarter-display">Q1<br>2026</div>
      </div>

      <div class="author-block">
        <div class="meta-row">
          <div class="meta-text">March 2026 &nbsp;&mdash;&nbsp; Confidential</div>
        </div>
        <div class="author-name">Jeremy Topp</div>
        <div class="author-role">CEO &amp; Co-Founder</div>
      </div>
    </div>

    <div class="slide-num">01 / 12</div>
  </div>
</body>
</html>

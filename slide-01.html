  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #fafafa;
      font-family: 'Instrument Sans', sans-serif;
    }

    .slide {
      width: 1280px;
      height: 720px;
      background: #fafafa;
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* LEFT HALF */
    .left {
      padding: 64px 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid #ece9ff;
    }

    .wordmark {
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #5200FF;
    }

    .hero-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .label {
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(17, 17, 17, 0.4);
      margin-bottom: 20px;
    }

    .title {
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 700;
      font-size: 68px;
      line-height: 0.95;
      color: #111;
      letter-spacing: -0.03em;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .meta-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5200FF;
      flex-shrink: 0;
    }

    .meta-text {
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: rgba(17, 17, 17, 0.45);
      letter-spacing: 0.02em;
    }

    /* RIGHT HALF */
    .right {
      padding: 64px 72px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: #fafafa;
    }

    .quarter-block {
      margin-bottom: 48px;
    }

    .quarter-label {
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(17, 17, 17, 0.35);
      margin-bottom: 12px;
    }

    .quarter {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 88px;
      line-height: 0.9;
      color: #5200FF;
      letter-spacing: -0.02em;
    }

    .author-block {
      border-top: 1px solid #ece9ff;
      padding-top: 24px;
    }

    .author-name {
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: #111;
      margin-bottom: 4px;
    }

    .author-role {
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: rgba(17, 17, 17, 0.45);
    }

    /* Slide number */
    .slide-num {
      position: absolute;
      top: 64px;
      right: 72px;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: rgba(17, 17, 17, 0.2);
      letter-spacing: 0.12em;
    }
  </style>

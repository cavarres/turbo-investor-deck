<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>Turbo — Investor Update Q1 2026</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    body { background: var(--bg); position: relative; }
    .accent-strip { position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: var(--primary); }
    .content { position: relative; padding: 72px 96px 72px 104px; height: 720px; display: flex; flex-direction: column; justify-content: space-between; }
    .top-label { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--primary); margin-bottom: 48px; }
    .main-title { font-family: var(--font-display); font-size: 80px; font-weight: 700; line-height: 1; letter-spacing: -0.03em; color: var(--text); margin-bottom: 16px; }
    .quarter { font-family: var(--font-display); font-size: 80px; font-weight: 400; line-height: 1; letter-spacing: -0.03em; color: var(--primary); margin-bottom: 56px; }
    .meta-block { display: flex; flex-direction: column; gap: 6px; }
    .author { font-size: 16px; font-weight: 500; color: var(--text); }
    .meta-small { font-size: 13px; color: var(--muted); }
    .wordmark { font-family: var(--font-display); font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: var(--primary); }
  </style>
</head>
<body>
  <div class="accent-strip"></div>
  <div class="content">
    <div>
      <div class="top-label">TURBO.</div>
      <div class="main-title">Investor Update</div>
      <div class="quarter">Q1 2026</div>
      <div class="meta-block">
        <div class="author">Jeremy Topp, CEO &amp; Co-Founder</div>
        <div class="meta-small">March 2026 &nbsp;&mdash;&nbsp; Confidential<br>(cao 29March2026)</div>
      </div>
    </div>
  </div>
</body>
</html>
